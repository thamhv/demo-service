openapi: 3.0.3

info:
  title: SMS Service API
  version: 1.0.0
  description: |
    SMS Service cung cấp các API cho phép gửi mới và gửi lại (resend)
    tin nhắn SMS.

    ## Features

    - Gửi SMS
    - Gửi lại SMS
    - JWT Authentication
    - JSON REST API

servers:
  - url: https://api.example.com
    description: Production

  - url: https://dev-api.example.com
    description: Development

tags:
  - name: SMS
    description: SMS operations

paths:

  /public/all/send-sms:
    post:
      tags:
        - SMS

      summary: Send SMS
      description: |
        Gửi một tin nhắn SMS mới đến số điện thoại nhận.

      operationId: sendSms

      security:
        - bearerAuth: []

      requestBody:
        required: true
        description: Thông tin tin nhắn cần gửi.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendSmsRequest'
            examples:
              otp:
                summary: OTP Message
                value:
                  phoneNumber: "0912345678"
                  message: "Your OTP is 123456"
                  senderId: "MYAPP"

      responses:
        "200":
          description: SMS được gửi thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendSmsResponse'

              examples:
                success:
                  value:
                    success: true
                    messageId: "SMS-202607010001"
                    status: SENT
                    message: SMS sent successfully

        "400":
          description: Dữ liệu request không hợp lệ.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        "401":
          description: Authentication failed.

        "403":
          description: Permission denied.

        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /public/all/resend-sms:
    post:
      tags:
        - SMS

      summary: Resend SMS
      description: |
        Gửi lại một tin nhắn SMS đã được gửi trước đó dựa trên
        messageId.

      operationId: resendSms

      security:
        - bearerAuth: []

      requestBody:
        required: true
        description: Thông tin yêu cầu gửi lại SMS.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendSmsRequest'
            examples:
              resend:
                value:
                  messageId: "SMS-202607010001"

      responses:
        "200":
          description: SMS được gửi lại thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendSmsResponse'

              examples:
                success:
                  value:
                    success: true
                    messageId: "SMS-202607010002"
                    status: SENT
                    message: SMS resent successfully

        "400":
          description: Dữ liệu request không hợp lệ.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        "401":
          description: Authentication failed.

        "403":
          description: Permission denied.

        "404":
          description: Không tìm thấy messageId.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    SendSmsRequest:
      type: object
      required:
        - phoneNumber
        - message

      properties:

        phoneNumber:
          type: string
          description: Số điện thoại người nhận.
          example: "0912345678"

        message:
          type: string
          description: Nội dung tin nhắn SMS.
          maxLength: 160
          example: "Your OTP is 123456"

        senderId:
          type: string
          description: Tên hiển thị người gửi (nếu được hỗ trợ).
          example: "MYAPP"

        scheduleTime:
          type: string
          format: date-time
          nullable: true
          description: Thời điểm gửi hẹn giờ.

    ResendSmsRequest:
      type: object
      required:
        - messageId

      properties:

        messageId:
          type: string
          description: |
            Mã giao dịch của SMS đã gửi trước đó.
            Nếu messageId không tồn tại, hệ thống trả về HTTP 404.
          example: "SMS-202607010001"

    SendSmsResponse:
      type: object

      properties:

        success:
          type: boolean
          description: Kết quả xử lý.
          example: true

        messageId:
          type: string
          description: |
            Mã giao dịch của lần gửi hiện tại.
            Với resend, đây có thể là messageId mới.
          example: "SMS-202607010001"

        status:
          type: string
          description: Trạng thái gửi SMS.
          enum:
            - QUEUED
            - SENT
            - FAILED

        message:
          type: string
          description: Thông báo kết quả.
          example: SMS sent successfully

    ErrorResponse:
      type: object

      properties:

        timestamp:
          type: string
          format: date-time
          description: Thời điểm phát sinh lỗi.
          example: "2026-07-01T10:15:30Z"

        status:
          type: integer
          description: HTTP status code.
          example: 400

        error:
          type: string
          description: Tên lỗi HTTP.
          example: Bad Request

        code:
          type: string
          description: Mã lỗi nghiệp vụ.
          example: SMS-001

        message:
          type: string
          description: Mô tả lỗi.
          example: Invalid phone number.

        path:
          type: string
          description: Endpoint được gọi.
          example: /public/all/send-sms